name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  # Only check library crates in CI — the viewer needs GPU/display libraries
  # that aren't available on headless CI runners.
  CI_PACKAGES: "-p hyle-ca-core -p hyle-ca-solver"

jobs:
  commit-msg:
    name: Commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|refactor|chore|docs|test|perf|ci): [a-z].*[^.]$'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            RANGE="-1"
          fi
          git log --format='%s' $RANGE | while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            echo "$MSG" | grep -qE '^Merge ' && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "BAD: $MSG"
              echo "Expected: <type>: <lowercase description>"
              echo "Types: feat, fix, refactor, chore, docs, test, perf, ci"
              exit 1
            fi
          done

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy $CI_PACKAGES --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test $CI_PACKAGES --release

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc $CI_PACKAGES --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
