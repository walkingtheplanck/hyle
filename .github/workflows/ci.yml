name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  # Only check library crates in CI — the viewer needs GPU/display libraries
  # that aren't available on headless CI runners.
  CI_PACKAGES: "-p hyle-ca-core -p hyle-ca-solver"

jobs:
  commit-msg:
    name: Commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|refactor|chore|config|docs|test|perf|ci): [a-z].*[^.]$'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            RANGE="-1"
          fi
          git log --format='%s' $RANGE | while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            echo "$MSG" | grep -qE '^Merge ' && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "BAD: $MSG"
              echo "Expected: <type>: <lowercase description>"
              echo "Types: feat, fix, refactor, chore, config, docs, test, perf, ci"
              exit 1
            fi
          done

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE" HEAD | grep -qE '\.(rs|toml|lock)$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: Formatting
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy $CI_PACKAGES --all-targets -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test $CI_PACKAGES --release

  doc:
    name: Documentation
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc $CI_PACKAGES --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
