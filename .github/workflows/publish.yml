name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check without publishing)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check that CI workflow passed on this commit
        run: |
          STATUS=$(gh run list --workflow=ci.yml --commit ${{ github.sha }} --json conclusion --jq '.[0].conclusion')
          if [ "$STATUS" != "success" ]; then
            echo "CI workflow has not passed on this commit (status: $STATUS)"
            echo "Push to master and wait for CI to pass before publishing."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  publish:
    name: Publish
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish hyle-ca-core
        run: cargo publish -p hyle-ca-core ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish hyle-ca-solver
        run: cargo publish -p hyle-ca-solver ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
