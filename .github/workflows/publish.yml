name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check without publishing)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check that CI workflow passed on this commit
        run: |
          STATUS=$(gh run list --workflow=ci.yml --commit ${{ github.sha }} --json conclusion --jq '.[0].conclusion')
          if [ "$STATUS" != "success" ]; then
            echo "CI workflow has not passed on this commit (status: $STATUS)"
            echo "Push to master and wait for CI to pass before publishing."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  publish:
    name: Publish
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Dry-run package order
        if: ${{ inputs.dry_run }}
        run: |
          cargo package -p hyle-ca-interface-derive
          cargo package -p hyle-ca-interface \
            --config 'patch.crates-io.hyle-ca-interface-derive.path="crates/ca-interface-derive"'
          cargo package -p hyle-ca-solver \
            --config 'patch.crates-io.hyle-ca-interface.path="crates/ca-interface"' \
            --config 'patch.crates-io.hyle-ca-interface-derive.path="crates/ca-interface-derive"'
          cargo package -p hyle-ca-analysis \
            --config 'patch.crates-io.hyle-ca-interface.path="crates/ca-interface"' \
            --config 'patch.crates-io.hyle-ca-interface-derive.path="crates/ca-interface-derive"' \
            --config 'patch.crates-io.hyle-ca-solver.path="crates/ca-solver"'

      - name: Publish hyle-ca-interface-derive
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p hyle-ca-interface-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index after derive
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish hyle-ca-interface
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p hyle-ca-interface
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index after interface
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish hyle-ca-solver
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p hyle-ca-solver
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index after solver
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish hyle-ca-analysis
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p hyle-ca-analysis
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
